feature_set:
  name: heuriboost_rag_v0
  version: 1
  features:
    - name: dense_score
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "Dense retriever score when available."
    - name: dense_rank_inverse
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "1 / dense_rank when dense rank is available."
    - name: sparse_score
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "Sparse retriever score when available."
    - name: sparse_rank_inverse
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "1 / sparse_rank when sparse rank is available."
    - name: rrf_score
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "Reciprocal rank fusion score from available dense/sparse ranks."
    - name: term_overlap_ratio
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "Share of unique query tokens present in the document text."
    - name: number_overlap_count
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "Count of numeric tokens shared by query and document."
    - name: entity_overlap_count
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "Count of capitalized/acronym entity tokens shared by query and document."
    - name: important_term_overlap
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "Count of shared query/document tokens of length >= 6 (proxy for rarer/important terms)."
    - name: low_information_density_flag
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "1 when the document has a low unique-token ratio or is very short."
    - name: doc_length_log
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "log1p of the document token count."
    - name: query_length_log
      type: numeric
      default_value: 0.0
      online_safe: true
      leakage_risk: low
      description: "log1p of the query token count."
