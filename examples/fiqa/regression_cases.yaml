# HeuriBoost FiQA regression cases.
#
# These are GATES, not training rows. Each case was mined from an observed
# baseline failure on the FiQA validation split (the dense retriever placed a
# semantic hard negative at rank 1 and pushed the supporting passage down) and
# then HAND-CONFIRMED by reading the query and passage texts. Candidates whose
# heuristic -1 label looked like an unlabeled-relevant passage (a false hard
# negative) were rejected and are not included.
#
# A gate is a FIXED failure: the current reranker already keeps the supporting
# doc in the protected top_k and the hard negative out. A case fails if the
# required doc drops out of top_k, or the forbidden doc enters top_k.
#
# Known boundary (NOT gates): the following hand-confirmed hard-negative cases
# are still too hard for the current reranker — it lifts the supporting passage
# but not yet into top-3, so they are recorded here for future work rather than
# enforced as blocking gates:
#   - 10117 "Solicitation of a Security"        (req 508922 not yet in top-3)
#   - 1     "business expenses, no income"      (req 14255; neg 363495 still in top-3)
#   - 1100  "combined contribution limits"      (req 441632; neg 15841 still in top-3)
#   - 10653 "aggressive in Roth/401k/taxable"   (neg 492971 still in top-3)
# Promote these to gates once the reranker can satisfy them.

cases:
  - case_id: fiqa_financial_security_definition
    query_id: 10087
    query: "What is a financial security?"
    must_include_doc_ids:
      - "375368"        # discusses what a security is / definitional
    must_not_include_doc_ids:
      - "83183"         # SIPC investor protection — adjacent but not a definition
    top_k: 3
    failure_type: semantic_hard_negative
    notes: "Definitional query; hard negative is an adjacent SIPC explainer that does not define the term. Dense ranked the SIPC post #1; reranker keeps the definitional passage in top-3 and the SIPC post out."

  - case_id: fiqa_non_homeowners_house_insurance
    query_id: 1084
    query: "Insurance for a house which is not homeowners insurance?"
    must_include_doc_ids:
      - "518949"        # vacant home insurance — the actual non-homeowners coverage asked about
    must_not_include_doc_ids:
      - "263145"        # lender-required insurance generalities — does not name the coverage type
    top_k: 3
    failure_type: semantic_hard_negative
    notes: "Hard negative talks about required insurance generally; supporting passage names 'vacant home insurance'. Dense ranked the generality #1; reranker keeps the specific coverage in top-3."
