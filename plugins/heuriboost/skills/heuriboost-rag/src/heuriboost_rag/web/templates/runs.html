{% extends "base.html" %}
{% block content %}
<header class="page-heading">
  <div><h1>训练运行</h1><p>查看 Reckless 修复运行状态</p></div>
</header>
<section class="table-section">
  <div class="section-heading"><h2>最近运行</h2></div>
  <div class="table-scroll">
    <table>
      <thead><tr><th>运行 ID</th><th>状态</th><th>更新时间</th></tr></thead>
      <tbody>
        {% for run in runs %}
        <tr>
          <td><a href="/runs/{{ run.id }}">{{ run.id }}</a></td>
          <td>{{ run.state }}</td>
          <td>{{ run.updated_at }}</td>
        </tr>
        {% else %}
        <tr><td colspan="3">暂无运行记录</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
